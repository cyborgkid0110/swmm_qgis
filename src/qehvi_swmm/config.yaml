# qEHVI-SWMM Configuration File

kpi:
  f1:                 # F1 — Flood Severity Index
    alpha: 0.5          # weight for flood volume component
    beta: 0.5           # weight for flood duration component (α + β = 1)
  f2:                 # F2 — Drainage Capacity Index
    zeta: 0.5           # weight for average flow / capacity ratio
    gamma: 0.5          # weight for surcharge duration
    delta: 0.0          # reserved for future use
  f3:                 # F3 — Sedimentation Index
    mu: 0.5             # weight for sedimentation extent
    nu: 0.5             # reserved for future maintenance cost term

bo:                   # Bayesian Optimization hyperparameters
  n_init: 16          # number of initial Sobol samples (post-rejection)
  max_iter: 2         # maximum BO iterations
  batch_size: 3       # q candidates per iteration
  num_restarts: 10    # restarts for optimize_acqf
  raw_samples: 64     # raw samples for optimize_acqf
  mc_samples: 32      # MC samples for qEHVI sampler
  patience: -1         # early stop if HV stagnates for this many iterations (-1 to disable)
  seed: 0             # random seed for Sobol sequence
  ref_point_offset: -0.1  # offset added to worst objective for reference point

constraints:
  maintenance_budget: 128.0  # A: max total maintenance volume in m^3 (constraint: sum(x_i) <= A)
