# Flood Risk (FROI) Configuration

indicators:
  fhi:
    # H1 (flood duration) and H2 (flood volume) only.
    # Reference values for standardization:
    #   H1: T_ref = simulation duration (computed at runtime)
    #   H2: V_ref_s = rainfall_depth_mm * area_ha * 10   (m^3)
    rainfall_depth_mm: 20.0      # assumed total rainfall depth for V_ref
  fei:
    # Land use raster path (used only when raster-based E2 is enabled).
    # For unit testing on Site_Drainage_Model.inp we pass E2 via the CSV
    # approach -- the mock landuse score lives in data/exposure/exposure.csv.
    land_use_raster: "data/exposure/vietnam_landuse.tif"
  fvi:
    # V2 and V3 are normalized from raw values via tanh(x / scale).
    # Scales are hardcoded in vulnerability.py (_V2_SCALE=500, _V3_SCALE=100).
  fri:
    # R1-R3 static resilience indicators only. No dynamic R4.
    # All positive-within-FRI: higher = more resilient.

aggregation:
  method: "simple"             # "simple" or "area_weighted"

standardization:
  fhi_method: "reference"      # "reference" (fixed bounds) or "data" (min-max)
  external_method: "data"      # for FEI/FVI/FRI static indicators

mapping:
  use_polygons: true           # primary: [POLYGONS] point-in-polygon
  fallback: "upstream_bfs"     # for junctions outside all polygons

data_paths:
  exposure:       "data/exposure/exposure.csv"
  vulnerability:  "data/vulnerability/vulnerability.csv"
  resilience:     "data/resilience/resilience_static.csv"

weights:
  expert_matrices:
    fhi: "data/weights/expert_fhi.json"
    fei: "data/weights/expert_fei.json"
    fvi: "data/weights/expert_fvi.json"
    fri: "data/weights/expert_fri.json"
