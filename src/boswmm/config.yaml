# BO-SWMM Configuration File
#
# Objective-function weights and FROI-specific parameters live in the
# sibling ``src/kpi/config.yaml`` — this file is just the BO hyperparameters
# and references to the KPI config for the pipeline wiring.

optimization:                 # Bayesian optimization settings
  mode: "multi"               # "single" (FROI, EI) or "multi" ([FHI, FEI, FVI, 1-FRI], EHVI)
  n_init: 16                  # number of initial Sobol samples (post-rejection)
  max_iter: 20                 # maximum BO iterations
  batch_size: 3               # q candidates per iteration
  num_restarts: 10            # restarts for optimize_acqf
  raw_samples: 64             # raw samples for optimize_acqf
  mc_samples: 32              # MC samples for qEHVI/EI sampler
  patience: -1                # early stop if progress stagnates for this many iterations (-1 to disable)
  seed: 0                     # random seed for Sobol sequence
  ref_point_offset: -0.1      # offset added to worst objective for EHVI reference point (unused in single mode)

constraints:
  maintenance_budget: 128.0   # A: max total maintenance volume in m^3 (constraint: sum(x_i) <= A)

kpi:
  concurrent_evaluations: 4   # number of parallel SWMM simulations in evaluate_batch (1 = sequential)
