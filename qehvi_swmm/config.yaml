# qEHVI-SWMM KPI Evaluation Configuration
# Reference: docs/optimization/obj_func.md

# F1 — Flood Severity Index
# F1 = Σ w_i * [ α * V_flood / V_ref + β * T_flood / T_ref ]
f1:
  alpha: 0.5    # weight for flood volume component
  beta: 0.5     # weight for flood duration component (α + β = 1)

# F2 — Drainage Capacity Index
# F2 = Σ L_j * [ ζ * (avg_flow / Q_full) + γ * (T_surch / T_ref) ]
f2:
  zeta: 0.5     # weight for average flow / capacity ratio
  gamma: 0.5    # weight for surcharge duration
  delta: 0.0    # reserved for future use

# F3 — Sedimentation Index
# F3 = Σ μ * (A_sed / A_pipe)
f3:
  mu: 0.5       # weight for sedimentation extent
  nu: 0.5       # reserved for future maintenance cost term

# Optimization — qEHVI Bayesian Optimization hyperparameters
optimization:
  n_init: 16          # number of initial Sobol samples
  max_iter: 50        # maximum BO iterations
  batch_size: 3       # q candidates per iteration
  num_restarts: 20    # restarts for optimize_acqf
  raw_samples: 512    # raw samples for optimize_acqf
  mc_samples: 256     # MC samples for qEHVI sampler
  patience: 5         # early stop if HV stagnates for this many iterations
  seed: 0             # random seed for Sobol sequence
  ref_point_offset: 0.1  # offset added to worst objective for reference point
